services:
  - type: web
    name: bar-pdf-backend
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: git submodule update --init --recursive && npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SEGMENT
        value: bar
